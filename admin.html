<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SweetBliss</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container { padding: 8rem 2rem; max-width: 1200px; margin: 0 auto; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .hidden { display: none !important; }
        .table-wrapper { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 2rem; border-radius: 15px; overflow-x: auto; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.5); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #ddd; }
        .action-btn { padding: 0.5rem 1rem; border: none; border-radius: 5px; cursor: pointer; color: white; margin-right: 0.5rem; font-weight: bold; transition: opacity 0.3s; }
        .action-btn:hover { opacity: 0.8; }
        .btn-approve { background: #25D366; }
        .btn-delete { background: #E27D60; }
        .status-badge { padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .status-pendiente { background: #ffd700; color: #000; }
        .status-aprobado { background: #25D366; color: white; }
        .login-box { max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.9); padding: 3rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .settings-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 2rem; border-radius: 15px; max-width: 600px; border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SweetBliss Admin</div>
        <ul class="nav-links">
            <li><a href="index.html">Ver Sitio Web</a></li>
        </ul>
    </nav>

    <!-- Simple solid background for admin instead of video for better readability -->
    <div class="bg-video" style="background: var(--bg-color); z-index:-2;"></div>

    <div class="admin-container">
        <!-- Login Section -->
        <div id="login-section" class="login-box">
            <h2 style="margin-bottom:1.5rem; color:var(--primary-color);">Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="admin-email" required placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="admin-pass" required>
                </div>
                <button type="submit" class="submit-btn">Entrar al Panel</button>
                <p id="login-error" style="color:red; margin-top:1rem; display:none; font-weight: 500;"></p>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden">
            <div class="dashboard-header">
                <h2>Panel de Control</h2>
                <button id="logout-btn" class="btn" style="padding: 0.5rem 1.5rem; background: #666;">Cerrar Sesión</button>
            </div>

            <!-- Settings -->
            <div class="settings-card">
                <h3 style="margin-bottom:1rem; color:var(--primary-color);">Configuración de la Web</h3>
                <p style="margin-bottom: 1rem; color: #555; font-size: 0.9rem;">Los pedidos web se enviarán a este número. Debe incluir el código de país sin símbolos (ej. 506 para Costa Rica).</p>
                <form id="settings-form">
                    <div class="form-group">
                        <label>Número de WhatsApp:</label>
                        <input type="text" id="setting-wa" placeholder="Ej. 50662464128" required>
                    </div>
                    <div class="form-group">
                        <label>URL de Audio de Fondo (MP3 o vacío para usar el predeterminado):</label>
                        <input type="url" id="setting-audio" placeholder="https://ejemplo.com/audio.mp3">
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button type="submit" class="submit-btn" style="width:auto; margin-top:0;">Guardar Cambios</button>
                        <span id="settings-msg" style="margin-left:1rem; color:#25D366; font-weight:bold;"></span>
                    </div>
                </form>
            </div>

            <h3 style="margin: 3rem 0 1rem 0; color:var(--primary-color);">Moderación de Comentarios</h3>
            <div class="table-wrapper">
                <table id="comments-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Autor</th>
                            <th>Comentario</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="comments-tbody">
                        <!-- Loaded dynamically via JS -->
                        <tr><td colspan="5">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
